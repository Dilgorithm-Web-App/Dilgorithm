<script>
  (function () {
    const frame = document.querySelector('[layer-name="anusha"]') || document.querySelector('[layer-name]');
    if (!frame) return;

    const baseW = parseFloat(frame.style.width) || 1440;
    const baseH = parseFloat(frame.style.height) || 810;

    function fitFrame() {
      const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
      frame.style.position = 'relative';
      frame.style.left = '0';
      frame.style.top = '0';
      frame.style.transformOrigin = 'top left';
      frame.style.transform = `scale(${scale})`;
      document.body.style.minWidth = `${Math.ceil(baseW * scale)}px`;
      document.body.style.minHeight = `${Math.ceil(baseH * scale)}px`;
    }

    fitFrame();
    window.addEventListener('resize', fitFrame);
  })();
</script>
<script>
  (function () {
    var PROFILE_FIELD = 'education';
    var target = '/figma-import/slide3.html';

    function apiOrigin() {
      if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000';
      return window.location.origin;
    }
    function profileUrl() { return apiOrigin() + '/api/accounts/profile/'; }
    function refreshUrl() { return apiOrigin() + '/api/accounts/token/refresh/'; }

    function authHeaders() {
      var token = localStorage.getItem('access_token');
      var h = { 'Content-Type': 'application/json' };
      if (token) h['Authorization'] = 'Bearer ' + token;
      return h;
    }

    function refreshAccessToken() {
      var refresh = localStorage.getItem('refresh_token');
      if (!refresh) return Promise.resolve(false);
      return fetch(refreshUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh: refresh }),
      })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          if (data && data.access) {
            localStorage.setItem('access_token', data.access);
            return true;
          }
          return false;
        })
        .catch(function () { return false; });
    }

    function patchProfile(payload) {
      return fetch(profileUrl(), {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify(payload),
      }).then(function (r) {
        if (r.ok) return r;
        if (r.status === 401) {
          return refreshAccessToken().then(function (ok) {
            if (!ok) return r;
            return fetch(profileUrl(), {
              method: 'PATCH',
              headers: authHeaders(),
              body: JSON.stringify(payload),
            });
          });
        }
        return r;
      });
    }

    var wrap = document.querySelector('[layer-name="Button"]');
    if (wrap) {
      var input = document.createElement('input');
      input.type = 'text';
      input.setAttribute('aria-label', PROFILE_FIELD);
      Object.assign(input.style, {
        width: '100%',
        height: '100%',
        border: 'none',
        outline: 'none',
        background: 'transparent',
        fontSize: '18px',
        padding: '0 12px',
        boxSizing: 'border-box',
        textAlign: 'center',
      });
      wrap.innerHTML = '';
      wrap.appendChild(input);

      fetch(profileUrl(), { headers: authHeaders() })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          var v = data[PROFILE_FIELD];
          if (v != null && String(v) !== '') input.value = String(v);
        })
        .catch(function () {});

      window.__slideProfileInput = input;
    }

    var confirmEl = document.querySelector('[layer-name="confirm"]');
    if (!confirmEl) return;
    confirmEl.style.cursor = 'pointer';
    confirmEl.addEventListener('click', function (ev) {
      ev.preventDefault();
      ev.stopPropagation();
      if (!localStorage.getItem('access_token')) {
        window.location.assign('/login');
        return;
      }
      var inputEl = window.__slideProfileInput;
      var value = inputEl ? String(inputEl.value || '').trim() : '';
      var payload = {};
      payload[PROFILE_FIELD] = value;
      patchProfile(payload)
        .then(function (r) {
          if (!r.ok) throw new Error('save failed');
          window.location.assign(target);
        })
        .catch(function () {
          alert('Could not save your answer. Please try again.');
        });
    });
  })();
</script>
